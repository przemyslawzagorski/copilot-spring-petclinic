# ============================================================================
# MCP Toolbox Configuration for PostgreSQL Hotel Search
# ============================================================================
# This file defines the database connection and SQL tools for the agent.
# 
# Supported PostgreSQL providers:
# - Neon.tech (recommended - free tier available)
# - Supabase (free tier available)
# - Railway.app ($5 free credits)
# - Local PostgreSQL
# ============================================================================

sources:
  # PostgreSQL connection
  hotels-database:
    kind: "postgres"

    # Connection parameters (only these fields are supported)
    host: "ep-green-frost-aiegln2l-pooler.c-4.us-east-1.aws.neon.tech"
    port: 5432
    database: "neondb"
    user: "neondb_owner"
    password: "npg_ESr0gTptknu1"

    # Example for Neon.tech:
    # Parse: postgresql://neondb_owner:PASSWORD@ep-xxxxx.us-east-2.aws.neon.tech/neondb
    # host: "ep-xxxxx.us-east-2.aws.neon.tech"
    # port: 5432
