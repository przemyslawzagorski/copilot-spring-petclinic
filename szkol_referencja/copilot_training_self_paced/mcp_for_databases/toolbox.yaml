# ============================================================================
# TOOLS - SQL queries exposed as agent tools
# ============================================================================

tools:
  # Search hotels by name (partial match)
  search-hotels-by-name:
    kind: postgres-sql
    source: hotels-database
    description: Search for hotels based on name. Supports partial matching (e.g., "Hilton" will find all Hilton hotels).
    parameters:
      - name: name
        type: string
        description: The name or partial name of the hotel to search for
    statement: |
      SELECT id, name, location, rating, price_per_night, description
      FROM hotels
      WHERE name ILIKE '%' || $1 || '%'
      ORDER BY rating DESC;

  # Search hotels by location
  search-hotels-by-location:
    kind: postgres-sql
    source: hotels-database
    description: Search for hotels in a specific city or location. Returns all hotels in that location sorted by rating.
    parameters:
      - name: location
        type: string
        description: The city or location to search for hotels in
    statement: |
      SELECT id, name, location, rating, price_per_night, description
      FROM hotels
      WHERE location ILIKE '%' || $1 || '%'
      ORDER BY rating DESC;

  # Search hotels by price range
  search-hotels-by-price-range:
    kind: postgres-sql
    source: hotels-database
    description: Find hotels within a specific price range per night. Returns hotels sorted by price.
    parameters:
      - name: min_price
        type: integer
        description: Minimum price per night in PLN
      - name: max_price
        type: integer
        description: Maximum price per night in PLN
    statement: |
      SELECT id, name, location, rating, price_per_night, description
      FROM hotels
      WHERE price_per_night BETWEEN $1 AND $2
      ORDER BY price_per_night ASC;

  # Get hotel by ID
  get-hotel-by-id:
    kind: postgres-sql
    source: hotels-database
    description: Get detailed information about a specific hotel by its unique ID.
    parameters:
      - name: hotel_id
        type: integer
        description: The unique identifier of the hotel
    statement: |
      SELECT id, name, location, rating, price_per_night, description
      FROM hotels
      WHERE id = $1;

  # Get top rated hotels
  get-top-rated-hotels:
    kind: postgres-sql
    source: hotels-database
    description: Get the top-rated hotels across all locations. Returns hotels with rating 4.5 or higher.
    parameters:
      - name: limit
        type: integer
        description: Maximum number of hotels to return (default 10)
    statement: |
      SELECT id, name, location, rating, price_per_night, description
      FROM hotels
      WHERE rating >= 4.5
      ORDER BY rating DESC
      LIMIT $1;

# ============================================================================
# TOOLSETS - Groups of tools that can be used together
# ============================================================================

toolsets:
  hotel_search_toolset:
    - search-hotels-by-name
    - search-hotels-by-location
    - search-hotels-by-price-range
    - get-hotel-by-id
    - get-top-rated-hotels

